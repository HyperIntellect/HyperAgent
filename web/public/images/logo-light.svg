  <!-- Left pillar -->
  <rect x="36" y="30" width="15" height="68" rx="4" fill="#FFFFFF"/>
  <!-- Right pillar -->
  <rect x="77" y="30" width="15" height="68" rx="4" fill="#FFFFFF"/>
  <!-- Crossbar -->
  <rect x="36" y="53" width="56" height="15" rx="4" fill="#FFFFFF"/>
  <!-- Agent node (negative space) -->
  <circle cx="64" cy="60.5" r="5" fill="#0891B2"/>
</svg>
