<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- HyperAgent monogram - Geometric H with agent node -->
  <rect width="120" height="120" rx="26" fill="#334155"/>
  <!-- Left pillar -->
  <rect x="34" y="28" width="14" height="64" rx="4" fill="#FFFFFF"/>
  <!-- Right pillar -->
  <rect x="72" y="28" width="14" height="64" rx="4" fill="#FFFFFF"/>
  <!-- Crossbar -->
  <rect x="34" y="49" width="52" height="14" rx="4" fill="#FFFFFF"/>
  <!-- Agent node (negative space) -->
  <circle cx="60" cy="56" r="5" fill="#22D3EE"/>
</svg>
